<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b7355"/>
      <stop offset="100%" stop-color="#7a6348"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- V60 cone shape -->
  <polygon points="160,140 352,140 300,400 212,400" fill="#fff" opacity="0.95"/>
  <!-- Ridges inside cone -->
  <line x1="200" y1="180" x2="230" y2="360" stroke="#8b7355" stroke-width="3" opacity="0.3"/>
  <line x1="230" y1="160" x2="248" y2="360" stroke="#8b7355" stroke-width="3" opacity="0.3"/>
  <line x1="256" y1="140" x2="256" y2="400" stroke="#8b7355" stroke-width="3" opacity="0.3"/>
  <line x1="282" y1="160" x2="264" y2="360" stroke="#8b7355" stroke-width="3" opacity="0.3"/>
  <line x1="312" y1="180" x2="282" y2="360" stroke="#8b7355" stroke-width="3" opacity="0.3"/>
  <!-- Drip hole -->
  <circle cx="256" cy="400" r="10" fill="#8b7355" opacity="0.5"/>
  <!-- Coffee drip -->
  <rect x="252" y="410" width="8" height="30" rx="4" fill="#ffd166" opacity="0.8"/>
  <!-- Steam lines -->
  <path d="M220,120 Q215,100 220,80 Q225,60 220,40" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <path d="M256,125 Q251,105 256,85 Q261,65 256,45" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
  <path d="M292,120 Q287,100 292,80 Q297,60 292,40" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
</svg>
